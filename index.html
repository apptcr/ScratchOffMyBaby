<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Egg Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --bg: #fff8f0;
    --font: 'Kanit', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    background-image:
      radial-gradient(#f9c84a33 1px, transparent 1px),
      radial-gradient(#f9c84a22 1px, var(--bg) 1px);
    background-size: 38px 38px;
    background-position: 0 0, 19px 19px;
    font-family: var(--font);
    overflow: hidden;
  }

  .card {
    background: #ffffffee;
    border: 4px solid var(--gold);
    border-radius: 28px;
    padding: 36px 32px 32px;
    text-align: center;
    box-shadow: 0 16px 40px #0002;
    max-width: 380px;
    width: 92vw;
  }

  h1 { font-size: 1.8rem; color: #444; margin-bottom: 6px; }
  .subtitle { font-size: 1rem; color: #888; margin-bottom: 28px; }

  /* ─── EGG SCENE ─── */
  .egg-scene {
    position: relative;
    width: 220px;
    height: 260px;
    margin: 0 auto 28px;
  }

  /* ชั้นเนื้อหา (ซ่อนไว้ก่อน) */
  .egg-reveal {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .egg-reveal.show { opacity: 1; }
  .reveal-icon { font-size: 64px; }
  .reveal-name { font-size: 2rem; font-weight: 700; color: #007bff; margin-top: 4px; }
  .reveal-sub  { font-size: 0.9rem; color: #555; margin-top: 2px; }

  /* SVG ไข่ */
  .egg-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ─── CRACK PATHS — เริ่มล่องหน ─── */
  .crack {
    stroke: #5a3e1b;
    stroke-width: 2.5;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .crack.visible { opacity: 1; }

  /* ─── SHATTER PIECES (ซ่อนไว้จนแตกสนิท) ─── */
  .shard {
    opacity: 0;
    transition: opacity 0.1s;
  }

  /* ─── BUTTON ─── */
  .hit-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    font-family: var(--font);
    font-size: 1.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f9c84a, #d4af37);
    color: #5a3e1b;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 18px #d4af3755;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
    user-select: none;
  }
  .hit-btn:active:not(:disabled) { transform: scale(0.95); box-shadow: 0 2px 8px #d4af3744; }
  .hit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .hammer { font-size: 1.5rem; display: inline-block; }
  .hit-btn:not(:disabled):hover .hammer { animation: swing 0.4s ease; }
  @keyframes swing {
    0%   { transform: rotate(0deg); }
    30%  { transform: rotate(-30deg); }
    70%  { transform: rotate(15deg); }
    100% { transform: rotate(0deg); }
  }

  /* shake ไข่เมื่อทุบ */
  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    15%  { transform: translate(-6px,-3px) rotate(-3deg); }
    30%  { transform: translate(6px,-5px) rotate(3deg); }
    45%  { transform: translate(-4px,2px) rotate(-2deg); }
    60%  { transform: translate(4px,4px) rotate(2deg); }
    75%  { transform: translate(-2px,-2px) rotate(-1deg); }
  }
  .egg-scene.shaking { animation: shake 0.45s ease; }

  /* ─── COUNTDOWN ─── */
  .countdown {
    height: 28px;
    margin-top: 14px;
    font-size: 1rem;
    color: #888;
    transition: opacity 0.3s;
  }
  .countdown span { color: var(--gold); font-weight: 700; font-size: 1.2rem; }

  /* ─── PROGRESS DOTS ─── */
  .progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #ccc;
    background: #eee;
    transition: background 0.4s, border-color 0.4s;
  }
  .dot.hit  { background: #f9c84a; border-color: #d4af37; }
  .dot.last { background: #ff6b6b; border-color: #cc3333; }
</style>
</head>
<body>
<div class="card">
  <h1>🥚 ลุ้นเพศลูกน้อย!</h1>
  <p class="subtitle">ทุบไข่ให้แตก แล้วจะรู้ว่าเป็นใคร</p>

  <!-- progress dots -->
  <div class="progress" id="progress"></div>

  <!-- egg scene -->
  <div class="egg-scene" id="eggScene">

    <!-- เนื้อหาใต้ไข่ -->
    <div class="egg-reveal" id="eggReveal">
      <div class="reveal-icon">👶🏻⚽</div>
      <div class="reveal-name">ลูกชาย!</div>
      <div class="reveal-sub">คุณปู่คุณย่าเตรียมรับขวัญนะครับ</div>
    </div>

    <!-- SVG ไข่ + รอยร้าว -->
    <svg class="egg-svg" viewBox="0 0 220 260" id="eggSvg">
      <defs>
        <radialGradient id="eggGrad" cx="40%" cy="35%">
          <stop offset="0%"   stop-color="#fff9ef"/>
          <stop offset="60%"  stop-color="#f5e6c8"/>
          <stop offset="100%" stop-color="#e8c88a"/>
        </radialGradient>
      </defs>

      <!-- ตัวไข่ -->
      <ellipse id="eggBody" cx="110" cy="138" rx="88" ry="110"
               fill="url(#eggGrad)" stroke="#d4b07a" stroke-width="2.5"/>

      <!-- รอยร้าว (ทยอยเปิด) -->
      <!-- crack 1 -->
      <g class="crack" id="crack1">
        <polyline points="110,70 104,85 115,95 108,110"/>
      </g>
      <!-- crack 2 -->
      <g class="crack" id="crack2">
        <polyline points="150,100 142,112 155,122 148,138"/>
        <polyline points="70,110  80,120  68,132"/>
      </g>
      <!-- crack 3 -->
      <g class="crack" id="crack3">
        <polyline points="125,150 118,165 130,175 120,190"/>
        <polyline points="90,145  98,158  85,170  95,180"/>
        <polyline points="160,140 168,155 158,165"/>
      </g>
      <!-- crack 4 (pre-final) -->
      <g class="crack" id="crack4">
        <polyline points="110,70  100,60  92,75  85,65"/>
        <polyline points="110,70  118,58  128,70 136,60"/>
        <polyline points="50,155  60,165  48,178  58,188"/>
        <polyline points="170,155 162,168 172,180"/>
      </g>

      <!-- เศษเปลือก (แสดงตอนแตกสนิท) -->
      <g id="shards">
        <polygon class="shard" id="s1" points="60,80  110,65  85,110" fill="#f0d8a8" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s2" points="110,65 160,80  135,105" fill="#eedcb2" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s3" points="38,130  70,110  60,160" fill="#f0d8a8" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s4" points="180,130 148,110 162,165" fill="#eedcb2" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s5" points="55,200  90,180  75,230" fill="#f0d8a8" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s6" points="165,200 130,185 148,235" fill="#eedcb2" stroke="#c9a96e" stroke-width="1.5"/>
        <polygon class="shard" id="s7" points="95,245  125,245 110,210" fill="#f5e6c8" stroke="#c9a96e" stroke-width="1.5"/>
      </g>
    </svg>
  </div>

  <button class="hit-btn" id="hitBtn">
    <span class="hammer">🔨</span> ทุบไข่!
  </button>
  <div class="countdown" id="countdown"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
(function(){
  const TOTAL_HITS   = 5;   // จำนวนครั้งที่ต้องทุบทั้งหมด
  const COOLDOWN_SEC = 5;   // วินาทีรอระหว่างทุบ

  const btn       = document.getElementById('hitBtn');
  const scene     = document.getElementById('eggScene');
  const countdown = document.getElementById('countdown');
  const reveal    = document.getElementById('eggReveal');
  const eggBody   = document.getElementById('eggBody');
  const progress  = document.getElementById('progress');

  let hits      = 0;
  let waiting   = false;
  let cdTimer   = null;

  // สร้าง progress dots
  for(let i = 0; i < TOTAL_HITS; i++){
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot'+i;
    progress.appendChild(d);
  }

  function updateDot(i){
    const d = document.getElementById('dot'+i);
    if(d) d.classList.add(i === TOTAL_HITS-1 ? 'last' : 'hit');
  }

  function showCrack(n){
    const el = document.getElementById('crack'+n);
    if(el) el.classList.add('visible');
  }

  function startCooldown(){
    waiting = true;
    btn.disabled = true;
    let sec = COOLDOWN_SEC;
    countdown.innerHTML = `รออีก <span>${sec}</span> วิ...`;
    cdTimer = setInterval(()=>{
      sec--;
      if(sec <= 0){
        clearInterval(cdTimer);
        waiting = false;
        btn.disabled = false;
        countdown.innerHTML = '';
        btn.querySelector('.hammer').style.animation = '';
      } else {
        countdown.innerHTML = `รออีก <span>${sec}</span> วิ...`;
      }
    }, 1000);
  }

  function shatterEgg(){
    // ซ่อนเปลือกไข่หลัก
    eggBody.style.transition = 'opacity 0.5s';
    eggBody.style.opacity = '0';

    // แสดงเศษเปลือก แล้วกระเด็น
    const shards = document.querySelectorAll('.shard');
    shards.forEach((s, i) => {
      s.style.opacity = '1';
      const angle = (i / shards.length) * Math.PI * 2;
      const dist  = 60 + Math.random() * 40;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      s.style.transition = `transform 0.7s cubic-bezier(0.2,0.8,0.4,1), opacity 0.7s 0.3s`;
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          s.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*180}deg)`;
          s.style.opacity = '0';
        });
      });
    });

    // ซ่อนรอยร้าวทั้งหมด
    document.querySelectorAll('.crack').forEach(c => {
      c.style.transition = 'opacity 0.3s';
      c.style.opacity = '0';
    });

    // เผยคำตอบ
    setTimeout(()=>{
      reveal.classList.add('show');
      fireConfetti();
      countdown.innerHTML = '✨ สมาชิกใหม่เป็นลูกชายครับ! ✨';
      countdown.style.color = '#007bff';
      countdown.style.fontWeight = '700';
    }, 600);
  }

  function fireConfetti(){
    const end = Date.now() + 4000;
    (function frame(){
      if(Date.now() > end) return;
      const t = (end - Date.now()) / 4000;
      confetti({ particleCount: Math.round(35*t), spread: 80, startVelocity: 32,
        origin: {x:0.2, y:0.65}, colors:['#007bff','#87ceeb','#fff','#d4af37'] });
      confetti({ particleCount: Math.round(35*t), spread: 80, startVelocity: 32,
        origin: {x:0.8, y:0.65}, colors:['#007bff','#e0f7fa','#fff','#ffe97d'] });
      requestAnimationFrame(frame);
    })();
  }

  btn.addEventListener('click', ()=>{
    if(waiting || hits >= TOTAL_HITS) return;

    hits++;
    updateDot(hits-1);

    // Shake ไข่
    scene.classList.remove('shaking');
    void scene.offsetWidth; // reflow
    scene.classList.add('shaking');
    scene.addEventListener('animationend', ()=> scene.classList.remove('shaking'), {once:true});

    if(hits < TOTAL_HITS){
      // แสดงรอยร้าวตามลำดับ
      showCrack(hits);

      // อัปเดต button label
      const left = TOTAL_HITS - hits;
      btn.querySelector('.hammer').textContent = '🔨';
      btn.childNodes[1].textContent = ` ทุบอีก ${left} ครั้ง!`;

      startCooldown();
    } else {
      // ครั้งสุดท้าย — แตกสนิท!
      btn.disabled = true;
      btn.style.display = 'none';
      shatterEgg();
    }
  });
})();
</script>
</body>
</html>
