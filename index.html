<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Egg Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #fff8f0;
    background-image:
      radial-gradient(#f9c84a33 1px, transparent 1px),
      radial-gradient(#f9c84a22 1px, #fff8f0 1px);
    background-size: 38px 38px;
    background-position: 0 0, 19px 19px;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
  }
  .card {
    background: #ffffffee;
    border: 4px solid #d4af37;
    border-radius: 28px;
    padding: 32px 28px 28px;
    text-align: center;
    box-shadow: 0 16px 40px #0002;
    max-width: 380px; width: 92vw;
  }
  h1 { font-size: 1.8rem; color: #444; margin-bottom: 4px; }
  .subtitle { font-size: 1rem; color: #888; margin-bottom: 22px; }

  .egg-wrap {
    position: relative;
    width: 220px; height: 260px;
    margin: 0 auto 24px;
  }
  canvas { position: absolute; top: 0; left: 0; }

  .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid #ccc; background: #eee;
    transition: background .3s, border-color .3s;
  }
  .dot.pink { background: #ff69b4; border-color: #c0408a; }
  .dot.blue { background: #3399ff; border-color: #0066cc; }

  .hit-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 34px;
    font-family: 'Kanit', sans-serif; font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #f9c84a, #d4af37);
    color: #5a3e1b;
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 18px #d4af3755;
    transition: transform .1s, opacity .3s;
    user-select: none;
  }
  .hit-btn:active:not(:disabled) { transform: scale(0.94); }
  .hit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .hammer { display: inline-block; font-size: 1.4rem; }

  @keyframes shake {
    0%,100%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-7px,-4px) rotate(-3deg)}
    40%{transform:translate(7px,-6px) rotate(3deg)}
    60%{transform:translate(-4px,3px) rotate(-2deg)}
    80%{transform:translate(4px,4px) rotate(2deg)}
  }
  .egg-wrap.shaking { animation: shake .45s ease; }

  .info {
    height: 30px; margin-top: 12px;
    font-size: 1rem; color: #888;
  }
  .info span { color: #d4af37; font-weight: 700; font-size: 1.1rem; }

  #flashOverlay {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 999;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🥚 ลุ้นเพศลูกน้อย!</h1>
  <p class="subtitle">ทุบไข่แล้วจะรู้ว่าเป็นใคร!</p>

  <div class="dots" id="dots"></div>

  <div class="egg-wrap" id="eggWrap">
    <canvas id="cColor" width="220" height="260"></canvas>
    <canvas id="cReveal" width="220" height="260" style="opacity:0;transition:opacity 0.5s"></canvas>
    <canvas id="cShell" width="220" height="260"></canvas>
  </div>

  <button class="hit-btn" id="hitBtn">
    <span class="hammer">🔨</span><span id="btnLabel"> ทุบไข่!</span>
  </button>
  <div class="info" id="info"></div>
</div>

<div id="flashOverlay"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
(function(){
  const TOTAL = 5;
  const WAIT  = 5;

  const wrap     = document.getElementById('eggWrap');
  const cColor   = document.getElementById('cColor');
  const cReveal  = document.getElementById('cReveal');
  const cShell   = document.getElementById('cShell');
  const colCtx   = cColor.getContext('2d');
  const revCtx   = cReveal.getContext('2d');
  const sCtx     = cShell.getContext('2d');
  const btn      = document.getElementById('hitBtn');
  const label    = document.getElementById('btnLabel');
  const infoEl   = document.getElementById('info');
  const dotsEl   = document.getElementById('dots');
  const flash    = document.getElementById('flashOverlay');

  const W=220, H=260, CX=110, CY=135, RX=85, RY=108;

  let hits   = 0;
  let waiting= false;
  let peeled = [];       // รูกะเทาะ (polygon points)
  let allCracks = [];    // รอยร้าวทั้งหมด

  const HIT_COLORS = [null, 'pink', 'blue', 'pink', 'blue'];

  // dots
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'; d.id='d'+i;
    dotsEl.appendChild(d);
  }

  function eggClip(ctx){
    ctx.beginPath();
    ctx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    ctx.clip();
  }

  /* ── วาดสีพื้นไข่ ── */
  function drawColor(color){
    colCtx.clearRect(0,0,W,H);
    colCtx.save();
    eggClip(colCtx);
    let g;
    if(color === 'pink'){
      g = colCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
      g.addColorStop(0,'#ffb3d9'); g.addColorStop(1,'#ff69b4');
      colCtx.fillStyle = g; colCtx.fill();
      colCtx.font='22px serif'; colCtx.textAlign='center'; colCtx.textBaseline='middle';
      ['💕','🎀','💗','💖','✨'].forEach((e,i)=>{
        const pos=[[CX,CY],[CX-28,CY-35],[CX+30,CY-20],[CX-22,CY+38],[CX+25,CY+42]];
        colCtx.fillText(e,pos[i][0],pos[i][1]);
      });
    } else if(color === 'blue'){
      g = colCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
      g.addColorStop(0,'#80d0ff'); g.addColorStop(1,'#1a8cff');
      colCtx.fillStyle = g; colCtx.fill();
      colCtx.font='22px serif'; colCtx.textAlign='center'; colCtx.textBaseline='middle';
      ['⭐','🌟','💙','🔵','✨'].forEach((e,i)=>{
        const pos=[[CX,CY],[CX-28,CY-35],[CX+30,CY-20],[CX-22,CY+38],[CX+25,CY+42]];
        colCtx.fillText(e,pos[i][0],pos[i][1]);
      });
    }
    colCtx.restore();
    colCtx.beginPath();
    colCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    colCtx.strokeStyle = color==='pink' ? '#c06090' : '#0055cc';
    colCtx.lineWidth=3; colCtx.stroke();
  }

  /* ── เฉลยจริง ── */
  function drawReveal(){
    revCtx.clearRect(0,0,W,H);
    revCtx.save();
    eggClip(revCtx);
    const g=revCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
    g.addColorStop(0,'#6ec6ff'); g.addColorStop(1,'#007bff');
    revCtx.fillStyle=g; revCtx.fill();
    revCtx.fillStyle='white';
    revCtx.textAlign='center'; revCtx.textBaseline='middle';
    revCtx.font='52px serif'; revCtx.fillText('👶🏻⚽',CX,CY-26);
    revCtx.font='bold 28px Kanit,sans-serif'; revCtx.fillText('ลูกชาย!',CX,CY+26);
    revCtx.font='15px Kanit,sans-serif'; revCtx.fillStyle='#cce8ff';
    revCtx.fillText('คุณปู่คุณย่าเตรียมรับขวัญ',CX,CY+58);
    revCtx.restore();
    revCtx.beginPath();
    revCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    revCtx.strokeStyle='#0050aa'; revCtx.lineWidth=3; revCtx.stroke();
  }

  /* ── สร้าง polygon รูปร่างขรุขระสำหรับรูกะเทาะ ── */
  function makeJaggedHole(cx, cy, baseR, points) {
    const pts = [];
    for (let i = 0; i < points; i++) {
      const angle = (i / points) * Math.PI * 2 - Math.PI / 2;
      // สลับรัศมียาวสั้นแบบสุ่ม เพื่อให้ขอบขรุขระ
      const jitter = 0.45 + Math.random() * 0.65;
      const r = baseR * jitter;
      // บิดแกน x/y ต่างกันเพื่อไม่ให้กลม
      const stretch = 0.7 + Math.random() * 0.6;
      pts.push({
        x: cx + Math.cos(angle) * r * stretch,
        y: cy + Math.sin(angle) * r * (2 - stretch)
      });
    }
    return pts;
  }

  /* ── สร้างรอยร้าวแบบฟ้าผ่า (recursive lightning) ── */
  function makeLightningCrack(x1, y1, x2, y2, depth) {
    const lines = [];
    if (depth === 0) {
      lines.push({ x1, y1, x2, y2 });
      return lines;
    }
    const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 14;
    const my = (y1 + y2) / 2 + (Math.random() - 0.5) * 14;
    lines.push(...makeLightningCrack(x1, y1, mx, my, depth - 1));
    lines.push(...makeLightningCrack(mx, my, x2, y2, depth - 1));
    // แตกแขนง
    if (Math.random() > 0.45) {
      const bx = mx + (Math.random() - 0.5) * 22;
      const by = my + (Math.random() - 0.5) * 22;
      lines.push(...makeLightningCrack(mx, my, bx, by, depth - 1));
    }
    return lines;
  }

  /* ── สร้าง patch (รูกะเทาะ + รอยร้าว) ── */
  const ZONES=[
    {ax:CX,    ay:CY-62},
    {ax:CX+55, ay:CY-18},
    {ax:CX-55, ay:CY-18},
    {ax:CX+46, ay:CY+52},
    {ax:CX-46, ay:CY+52},
  ];

  function makePatch(idx){
    const z = ZONES[idx];
    const baseR = 28 + Math.random() * 14;
    const numPts = 14 + Math.floor(Math.random() * 6); // จุดมากขึ้น = ขรุขระมากขึ้น
    const poly = makeJaggedHole(z.ax, z.ay, baseR, numPts);

    // สร้างรอยร้าวออกจากรู
    const cracks = [];
    const numCracks = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < numCracks; i++) {
      const angle = (i / numCracks) * Math.PI * 2 + Math.random() * 0.5;
      const startR = baseR * 0.8;
      const endR   = baseR * (1.8 + Math.random() * 1.4);
      const sx = z.ax + Math.cos(angle) * startR;
      const sy = z.ay + Math.sin(angle) * startR;
      const ex = z.ax + Math.cos(angle) * endR;
      const ey = z.ay + Math.sin(angle) * endR;
      cracks.push(...makeLightningCrack(sx, sy, ex, ey, 2));
    }

    return { poly, cracks, cx: z.ax, cy: z.ay };
  }

  /* ── วาดเปลือกไข่ ── */
  function drawShell(){
    sCtx.clearRect(0,0,W,H);
    sCtx.save();
    // clip ครั้งเดียว ครอบทุกอย่าง รอยร้าวจะไม่ทะลุออกนอกขอบ
    sCtx.beginPath();
    sCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    sCtx.clip();

    // พื้นเปลือก
    const sg = sCtx.createRadialGradient(CX-25,CY-40,8,CX,CY,RX*1.1);
    sg.addColorStop(0,'#fff9ef');
    sg.addColorStop(0.55,'#f5e6c8');
    sg.addColorStop(1,'#d4a84b');
    sCtx.fillStyle = sg;
    sCtx.fill();

    // เนื้อสัมผัสจุดเล็กๆ
    sCtx.fillStyle='rgba(255,255,255,0.28)';
    for(let i=0;i<120;i++){
      sCtx.beginPath();
      sCtx.arc(CX-RX+Math.random()*RX*2,CY-RY+Math.random()*RY*2,Math.random()*1.8,0,Math.PI*2);
      sCtx.fill();
    }

    // เจาะรูด้วย polygon ขรุขระ (อยู่ใน clip แล้ว ไม่ทะลุขอบ)
    sCtx.globalCompositeOperation='destination-out';
    peeled.forEach(p => {
      if (!p.poly) return;
      sCtx.beginPath();
      sCtx.moveTo(p.poly[0].x, p.poly[0].y);
      for (let i = 1; i < p.poly.length; i++) {
        // ใช้ quadratic curve เพื่อให้ขอบโค้งนิดๆ ไม่แข็งกระด้าง
        const prev = p.poly[i-1];
        const cur  = p.poly[i];
        const mx   = (prev.x + cur.x) / 2;
        const my   = (prev.y + cur.y) / 2;
        sCtx.quadraticCurveTo(prev.x, prev.y, mx, my);
      }
      sCtx.closePath();
      sCtx.fill();
    });
    // รูสุดท้าย (ครั้งที่ 5) เจาะทั้งหมด
    if (hits >= TOTAL) {
      sCtx.beginPath();
      sCtx.ellipse(CX,CY,RX+12,RY+12,0,0,Math.PI*2);
      sCtx.fill();
    }
    sCtx.globalCompositeOperation='source-over';

    // วาดรอยร้าว (อยู่ใน clip ขอบไข่ ไม่ทะลุออกนอก)
    allCracks.forEach(c => {
      sCtx.beginPath();
      sCtx.moveTo(c.x1, c.y1);
      sCtx.lineTo(c.x2, c.y2);
      sCtx.strokeStyle = 'rgba(100,65,20,0.75)';
      sCtx.lineWidth = 1.2;
      sCtx.lineCap = 'round';
      sCtx.stroke();
    });

    sCtx.restore(); // ปิด clip ขอบไข่

    // ขอบ
    sCtx.beginPath();
    sCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    sCtx.strokeStyle='#a07840';
    sCtx.lineWidth=3;
    sCtx.stroke();
  }

  /* ── เศษเปลือกกระเด็น ── */
  function spawnChips(count){
    const rect=cShell.getBoundingClientRect();
    const ex=rect.left+W/2, ey=rect.top+H/2;
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const chip=document.createElement('div');
        // ทำให้ชิ้นเปลือกเป็นรูปร่างสุ่ม (ไม่ใช่สี่เหลี่ยม)
        const w = 8+Math.random()*16, h = 6+Math.random()*10;
        const br = `${Math.random()*4}px ${Math.random()*8}px ${Math.random()*4}px ${Math.random()*8}px`;
        chip.style.cssText=`position:fixed;width:${w}px;height:${h}px;
          background:linear-gradient(135deg,#fff9ef,#e8c88a);
          border:1px solid #c9a96e;
          border-radius:${br};
          pointer-events:none;z-index:9999;
          left:${ex+(Math.random()-.5)*120}px;
          top:${ey+(Math.random()-.5)*80}px;`;
        document.body.appendChild(chip);
        const vx=(Math.random()-.5)*16, vy=-(5+Math.random()*10), rot=(Math.random()-.5)*500;
        let cy2=parseFloat(chip.style.top),cx2=parseFloat(chip.style.left),gy=0,t=0;
        (function fall(){
          t++; gy+=.68; cy2+=vy+gy; cx2+=vx;
          chip.style.top=cy2+'px'; chip.style.left=cx2+'px';
          chip.style.transform=`rotate(${rot*t*.05}deg)`;
          chip.style.opacity=t>28?Math.max(0,1-(t-28)/18):'1';
          if(t<55) requestAnimationFrame(fall); else chip.remove();
        })();
      },i*55);
    }
  }

  /* ── ไฟกะพริบครั้งสุดท้าย ── */
  function flashColors(cb){
    const colors=['#ff69b4','#1a8cff','#ff69b4','#1a8cff','#ff69b4','#1a8cff','#ff69b4','#1a8cff'];
    let i=0;
    function next(){
      if(i>=colors.length){ flash.style.opacity='0'; cb(); return; }
      flash.style.background=colors[i];
      flash.style.opacity='0.45';
      i++;
      setTimeout(()=>{ flash.style.opacity='0'; setTimeout(next,120); },220);
    }
    next();
  }

  function startWait(){
    waiting=true; btn.disabled=true;
    let s=WAIT;
    infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
    const t=setInterval(()=>{
      s--;
      if(s<=0){ clearInterval(t); waiting=false; btn.disabled=false; infoEl.innerHTML=''; }
      else infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
    },1000);
  }

  function celebrate(){
    const end=Date.now()+4500;
    (function f(){
      if(Date.now()>end)return;
      const tt=(end-Date.now())/4500;
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.2,y:.65},colors:['#007bff','#87ceeb','#fff','#d4af37']});
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.8,y:.65},colors:['#007bff','#e0f7fa','#fff','#ffe97d']});
      requestAnimationFrame(f);
    })();
  }

  btn.addEventListener('click',()=>{
    if(waiting||hits>=TOTAL) return;

    wrap.classList.remove('shaking');
    void wrap.offsetWidth;
    wrap.classList.add('shaking');
    wrap.addEventListener('animationend',()=>wrap.classList.remove('shaking'),{once:true});

    const hitIdx = hits;
    hits++;

    const dot = document.getElementById('d'+hitIdx);
    if(hits < TOTAL){
      dot.classList.add(HIT_COLORS[hits]);
    } else {
      dot.classList.add('blue');
    }

    if(hits < TOTAL){
      const patch = makePatch(hitIdx);
      peeled.push(patch);
      allCracks.push(...patch.cracks);
      drawColor(HIT_COLORS[hits]);
      drawShell();
      spawnChips(5+Math.floor(Math.random()*5));
      label.textContent=` ทุบอีก ${TOTAL-hits} ครั้ง!`;
      startWait();

    } else {
      // ครั้งสุดท้าย
      spawnChips(20);
      drawShell(); // วาดก่อนเพื่อให้แอนิเมชันเห็นรอยแตก
      btn.disabled=true;
      label.textContent=' กำลังเฉลย...';

      flashColors(()=>{
        cColor.style.transition='opacity 0.4s';
        cColor.style.opacity='0';
        cReveal.style.opacity='1';
        btn.style.display='none';
        setTimeout(()=>{
          infoEl.innerHTML='🎉 เฉลยแล้ว! เป็นลูกชายครับ! 🎉';
          infoEl.style.color='#007bff';
          infoEl.style.fontWeight='700';
          celebrate();
        },400);
      });
    }
  });

  /* ── init ── */
  drawColor('pink');
  drawReveal();
  drawShell();

})();
</script>
</body>
</html>
