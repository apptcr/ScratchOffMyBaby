<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Reveal Sparkle</title>
    <!-- Open Graph for Line/Facebook Preview -->
    <meta property="og:title" content="มีของขวัญมาให้ขูดลุ้นกันครับ!" />
    <meta property="og:description" content="ลองขูดดูซิว่า... จะได้อะไร?" />
    <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=Scratch+Here" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f8ff; /* Alice Blue */
            --boy-blue: #007bff; /* Bright Blue */
            --gold: #d4af37;
            --main-font: 'Kanit', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--gold) 1px, transparent 1px),
                radial-gradient(var(--gold) 1px, var(--bg-color) 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: var(--main-font);
            overflow: hidden; /* Prevent scrolling during confetti */
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 4px solid var(--gold);
            max-width: 90%;
        }

        h1 {
            color: #444;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Scratch Card Area */
        .scratch-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* The hidden content (under the scratch layer) */
        .scratch-results {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--boy-blue);
            color: white;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .scratch-results.show {
            opacity: 1;
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: -10px;
        }

        .result-text-big {
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .result-text-small {
            font-size: 1.2rem;
            margin-top: -10px;
        }

        /* The canvas scratch layer */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            z-index: 1;
        }

        .instruction {
            color: #666;
            margin-top: 20px;
            font-size: 1.1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .scratch-container {
                width: 280px;
                height: 280px;
            }
            h1 { font-size: 2rem; }
            .result-text-big { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ขูดลุ้นของขวัญกัน!</h1>
    
    <div class="scratch-container" id="js-scratch-container">
        
        <!-- นี่คือส่วนเฉลยที่จะอยู่ด้านล่าง -->
        <div class="scratch-results" id="js-scratch-results">
            <div class="result-icon">👶🏻⚽</div>
            <div class="result-text-big">ได้ลูกชาย</div>
            <div class="result-text-small">คุณปู่คุณย่าเตรียมรับขวัญนะครับ</div>
        </div>

        <!-- นี่คือ Layer สีทองด้านบนที่ต้องขูด -->
        <canvas id="scratch-canvas" width="320" height="320"></canvas>
    </div>

    <p class="instruction" id="js-instruction">ใช้นิ้วหรือเมาส์ขูดที่ช่องด้านบนได้เลย</p>
</div>

<!-- Confetti library for the celebration effect -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('js-scratch-container');
    const results = document.getElementById('js-scratch-results');
    const instruction = document.getElementById('js-instruction');
    
    let isDrawing = false;
    let totalPixels = canvas.width * canvas.height;
    let clearedPixels = 0;
    const revealThreshold = 0.4; // 40% cleared to reveal
    let revealed = false;

    // --- SETUP THE SCRATCH LAYER (GOLD) ---
    function initScratchLayer() {
        // Create a nice gradient for the scratch surface
        const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width
        );
        gradient.addColorStop(0, '#f9df7b'); // Light Gold
        gradient.addColorStop(0.5, '#d4af37'); // Metallic Gold
        gradient.addColorStop(1, '#a67c00'); // Dark Gold

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add some "texture" or sparkles on the scratch layer
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        for (let i = 0; i < 200; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Add 'Scratch Here' text directly on the canvas
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.font = '700 24px Kanit';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('ขูดตรงนี้', canvas.width / 2, canvas.height / 2);
    }

    // --- DRAWING / SCRATCHING LOGIC ---
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        // Handle touch and mouse events
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function scratch(e) {
        if (!isDrawing || revealed) return;
        e.preventDefault(); // Prevent scrolling on touch

        const { x, y } = getMousePos(e);

        // This is what actually 'scratches' - making pixels transparent
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 25, 0, Math.PI * 2, false); // Brush size is 25
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        checkCompletion();
    }

    // --- CHECK HOW MUCH IS CLEARED ---
    function checkCompletion() {
        if (revealed) return;

        // Sample pixels to see how much is transparent
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let pixelsCleared = 0;
        
        // Check every 20th pixel for performance
        for (let i = 0; i < imageData.data.length; i += 4 * 20) {
            if (imageData.data[i + 3] === 0) { // Alpha channel is 0 (transparent)
                pixelsCleared += 20;
            }
        }

        if (pixelsCleared / totalPixels >= revealThreshold) {
            revealFinalResult();
        }
    }

    // --- REVEAL ANIMATION & CELEBRATION ---
    function revealFinalResult() {
        if (revealed) return;
        revealed = true;
        
        results.classList.add('show');
        instruction.innerHTML = '✨ สมาชิกใหม่เป็นลูกชายครับ! ✨';
        
        // Add a nice fade out to the canvas itself
        canvas.style.transition = 'opacity 1s ease-out';
        canvas.style.opacity = '0';
        
        // Fire Confetti!
        var duration = 4 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            var particleCount = 50 * (timeLeft / duration);
            // Confetti in boyish blue colors
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#007bff', '#87ceeb', '#ffffff'] }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#007bff', '#e0f7fa', '#d4af37'] }));
        }, 250);
    }

    // --- EVENT LISTENERS ---
    // Start drawing
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; scratch(e); });
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });

    // Drawing
    window.addEventListener('mousemove', scratch);
    window.addEventListener('touchmove', scratch);

    // Stop drawing
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);

    // Initial setup
    initScratchLayer();

</script>

</body>
</html>
