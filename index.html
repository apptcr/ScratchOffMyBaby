<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Egg Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #fff8f0;
    background-image:
      radial-gradient(#f9c84a33 1px, transparent 1px),
      radial-gradient(#f9c84a22 1px, #fff8f0 1px);
    background-size: 38px 38px;
    background-position: 0 0, 19px 19px;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
  }
  .card {
    background: #ffffffee;
    border: 4px solid #d4af37;
    border-radius: 28px;
    padding: 32px 28px 28px;
    text-align: center;
    box-shadow: 0 16px 40px #0002;
    max-width: 380px;
    width: 92vw;
  }
  h1 { font-size: 1.8rem; color: #444; margin-bottom: 4px; }
  .subtitle { font-size: 1rem; color: #888; margin-bottom: 22px; }

  .egg-wrap {
    position: relative;
    width: 220px; height: 260px;
    margin: 0 auto 24px;
  }
  canvas { position: absolute; top: 0; left: 0; }

  .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid #ccc; background: #eee;
    transition: background .4s, border-color .4s;
  }
  .dot.done { background: #f9c84a; border-color: #d4af37; }

  .hit-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 34px;
    font-family: 'Kanit', sans-serif; font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #f9c84a, #d4af37);
    color: #5a3e1b;
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 18px #d4af3755;
    transition: transform .1s, opacity .3s;
    user-select: none;
  }
  .hit-btn:active:not(:disabled) { transform: scale(0.94); }
  .hit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .hammer { display: inline-block; font-size: 1.4rem; }
  @keyframes swing {
    0%{transform:rotate(0)} 30%{transform:rotate(-35deg)} 70%{transform:rotate(15deg)} 100%{transform:rotate(0)}
  }
  .hit-btn:not(:disabled):hover .hammer { animation: swing .4s ease; }

  @keyframes shake {
    0%,100%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-7px,-4px) rotate(-3deg)}
    40%{transform:translate(7px,-6px) rotate(3deg)}
    60%{transform:translate(-4px,3px) rotate(-2deg)}
    80%{transform:translate(4px,4px) rotate(2deg)}
  }
  .egg-wrap.shaking { animation: shake .45s ease; }

  .info {
    height: 30px; margin-top: 12px;
    font-size: 1rem; color: #888;
  }
  .info span { color: #d4af37; font-weight: 700; font-size: 1.1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>🥚 ลุ้นเพศลูกน้อย!</h1>
  <p class="subtitle">ทุบไข่ให้แตก แล้วจะรู้ว่าเป็นใคร</p>

  <div class="dots" id="dots"></div>

  <div class="egg-wrap" id="eggWrap">
    <!-- ล่าง: ชมพู (หลอก) -->
    <canvas id="cPink"  width="220" height="260"></canvas>
    <!-- กลาง: เฉลยจริง (ซ่อนไว้จนครั้งสุดท้าย) -->
    <canvas id="cReveal" width="220" height="260" style="opacity:0;transition:opacity 0.6s"></canvas>
    <!-- บน: เปลือกไข่ -->
    <canvas id="cShell" width="220" height="260"></canvas>
  </div>

  <button class="hit-btn" id="hitBtn">
    <span class="hammer">🔨</span><span id="btnLabel"> ทุบไข่!</span>
  </button>
  <div class="info" id="info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
(function(){
  const TOTAL = 5;
  const WAIT  = 5;

  const wrap    = document.getElementById('eggWrap');
  const cPink   = document.getElementById('cPink');
  const cReveal = document.getElementById('cReveal');
  const cShell  = document.getElementById('cShell');
  const pCtx    = cPink.getContext('2d');
  const revCtx  = cReveal.getContext('2d');
  const sCtx    = cShell.getContext('2d');
  const btn     = document.getElementById('hitBtn');
  const label   = document.getElementById('btnLabel');
  const infoEl  = document.getElementById('info');
  const dotsEl  = document.getElementById('dots');

  const W=220, H=260, CX=110, CY=135, RX=85, RY=108;

  let hits   = 0;
  let waiting= false;
  let peeled = [];

  // dots
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'; d.id='d'+i;
    dotsEl.appendChild(d);
  }

  function eggClip(ctx){
    ctx.beginPath();
    ctx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    ctx.clip();
  }

  /* ── ชั้น 1: สีชมพู (หลอก) ── */
  function drawPink(){
    pCtx.clearRect(0,0,W,H);
    pCtx.save();
    eggClip(pCtx);
    const g=pCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
    g.addColorStop(0,'#ffb3d9');
    g.addColorStop(1,'#ff69b4');
    pCtx.fillStyle=g;
    pCtx.fill();
    // แต้มหัวใจเล็กๆ ให้ดูหญิงขึ้น
    pCtx.font='22px serif';
    pCtx.textAlign='center';
    pCtx.textBaseline='middle';
    const hearts=['💕','🎀','💗','💖','✨'];
    const pos=[
      [CX,CY],[CX-28,CY-35],[CX+30,CY-20],
      [CX-22,CY+38],[CX+25,CY+42]
    ];
    pos.forEach((p,i)=>pCtx.fillText(hearts[i],p[0],p[1]));
    pCtx.restore();
    // ขอบ
    pCtx.beginPath();
    pCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    pCtx.strokeStyle='#c06090';
    pCtx.lineWidth=3;
    pCtx.stroke();
  }

  /* ── ชั้น 2: เฉลยจริง (ฟ้า ลูกชาย) ── */
  function drawReveal(){
    revCtx.clearRect(0,0,W,H);
    revCtx.save();
    eggClip(revCtx);
    const g=revCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
    g.addColorStop(0,'#6ec6ff');
    g.addColorStop(1,'#007bff');
    revCtx.fillStyle=g;
    revCtx.fill();
    revCtx.fillStyle='white';
    revCtx.textAlign='center';
    revCtx.textBaseline='middle';
    revCtx.font='52px serif';
    revCtx.fillText('👶🏻⚽',CX,CY-26);
    revCtx.font='bold 28px Kanit,sans-serif';
    revCtx.fillText('ลูกชาย!',CX,CY+26);
    revCtx.font='15px Kanit,sans-serif';
    revCtx.fillStyle='#cce8ff';
    revCtx.fillText('คุณปู่คุณย่าเตรียมรับขวัญ',CX,CY+58);
    revCtx.restore();
    revCtx.beginPath();
    revCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    revCtx.strokeStyle='#0050aa';
    revCtx.lineWidth=3;
    revCtx.stroke();
  }

  /* ── ชั้น 3: เปลือกไข่ (มีรู destination-out) ── */
  function drawShell(){
    sCtx.clearRect(0,0,W,H);
    sCtx.save();
    eggClip(sCtx);
    const sg=sCtx.createRadialGradient(CX-25,CY-40,8,CX,CY,RX*1.1);
    sg.addColorStop(0,'#fff9ef');
    sg.addColorStop(0.55,'#f5e6c8');
    sg.addColorStop(1,'#d4a84b');
    sCtx.fillStyle=sg;
    sCtx.fill();
    // sparkle
    sCtx.fillStyle='rgba(255,255,255,0.3)';
    for(let i=0;i<120;i++){
      sCtx.beginPath();
      sCtx.arc(CX-RX+Math.random()*RX*2, CY-RY+Math.random()*RY*2, Math.random()*1.8,0,Math.PI*2);
      sCtx.fill();
    }
    sCtx.restore();

    // เจาะรู
    sCtx.globalCompositeOperation='destination-out';
    peeled.forEach(p=>{
      sCtx.beginPath();
      sCtx.ellipse(p.x,p.y,p.rx,p.ry,p.angle,0,Math.PI*2);
      sCtx.fill();
    });
    sCtx.globalCompositeOperation='source-over';

    // เส้นร้าว
    peeled.forEach(p=>{
      (p.cracks||[]).forEach(c=>{
        sCtx.beginPath();
        sCtx.moveTo(c.x1,c.y1);
        sCtx.lineTo(c.x2,c.y2);
        sCtx.strokeStyle='#8b5e1a';
        sCtx.lineWidth=1.5;
        sCtx.stroke();
      });
    });

    // ขอบไข่
    sCtx.beginPath();
    sCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    sCtx.strokeStyle='#a07840';
    sCtx.lineWidth=3;
    sCtx.stroke();
  }

  /* ── กำหนด zone ที่จะกะเทาะ ── */
  const ZONES=[
    {ax:CX,    ay:CY-55},
    {ax:CX+52, ay:CY-15},
    {ax:CX-52, ay:CY-15},
    {ax:CX+44, ay:CY+50},
    {ax:CX-44, ay:CY+50},
  ];

  function makePatch(idx){
    const z=ZONES[idx];
    const rx=30+Math.random()*16;
    const ry=22+Math.random()*14;
    const angle=Math.random()*Math.PI;
    const cracks=[];
    const nc=4+Math.floor(Math.random()*3);
    for(let i=0;i<nc;i++){
      const a=Math.random()*Math.PI*2;
      cracks.push({
        x1:z.ax+Math.cos(a)*rx*0.85, y1:z.ay+Math.sin(a)*rx*0.85,
        x2:z.ax+Math.cos(a)*(rx*1.5+Math.random()*18),
        y2:z.ay+Math.sin(a)*(rx*1.5+Math.random()*18),
      });
    }
    return {x:z.ax,y:z.ay,rx,ry,angle,cracks};
  }

  /* ── เศษกระเด็น ── */
  function spawnChips(count){
    const rect=cShell.getBoundingClientRect();
    const ex=rect.left+W/2, ey=rect.top+H/2;
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const chip=document.createElement('div');
        const cw=12+Math.random()*18, ch=9+Math.random()*12;
        chip.style.cssText=`position:fixed;width:${cw}px;height:${ch}px;
          background:linear-gradient(135deg,#fff9ef,#e8c88a);
          border:1px solid #c9a96e;border-radius:${2+Math.random()*5}px;
          pointer-events:none;z-index:9999;
          left:${ex+(Math.random()-.5)*100}px;top:${ey+(Math.random()-.5)*70}px;`;
        document.body.appendChild(chip);
        const vx=(Math.random()-.5)*14, vy=-(5+Math.random()*9);
        const rot=(Math.random()-.5)*400;
        let cy2=parseFloat(chip.style.top),cx2=parseFloat(chip.style.left),gy=0,t=0;
        (function fall(){
          t++; gy+=0.65; cy2+=vy+gy; cx2+=vx;
          chip.style.top=cy2+'px'; chip.style.left=cx2+'px';
          chip.style.transform=`rotate(${rot*t*.05}deg)`;
          chip.style.opacity=t>28?Math.max(0,1-(t-28)/18):'1';
          if(t<55) requestAnimationFrame(fall); else chip.remove();
        })();
      },i*55);
    }
  }

  /* ── countdown ── */
  function startWait(){
    waiting=true; btn.disabled=true;
    let s=WAIT;
    infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
    const t=setInterval(()=>{
      s--;
      if(s<=0){
        clearInterval(t); waiting=false; btn.disabled=false; infoEl.innerHTML='';
      } else {
        infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
      }
    },1000);
  }

  /* ── confetti ── */
  function celebrate(){
    const end=Date.now()+4500;
    (function f(){
      if(Date.now()>end)return;
      const tt=(end-Date.now())/4500;
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.2,y:.65},colors:['#007bff','#87ceeb','#fff','#d4af37']});
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.8,y:.65},colors:['#007bff','#e0f7fa','#fff','#ffe97d']});
      requestAnimationFrame(f);
    })();
  }

  /* ── ทุบ ── */
  btn.addEventListener('click',()=>{
    if(waiting||hits>=TOTAL) return;

    // shake
    wrap.classList.remove('shaking');
    void wrap.offsetWidth;
    wrap.classList.add('shaking');
    wrap.addEventListener('animationend',()=>wrap.classList.remove('shaking'),{once:true});

    document.getElementById('d'+hits).classList.add('done');
    hits++;

    if(hits < TOTAL){
      // กะเทาะเปลือก → เห็นชมพูข้างใน (หลอก!)
      peeled.push(makePatch(hits-1));
      drawShell();
      spawnChips(5+Math.floor(Math.random()*5));
      label.textContent=` ทุบอีก ${TOTAL-hits} ครั้ง!`;
      startWait();

    } else {
      // ครั้งสุดท้าย — เปิดเผยทั้งหมด!
      // เจาะเปลือกออกทั้งหมด
      peeled.push({x:CX,y:CY,rx:RX+10,ry:RY+10,angle:0,cracks:[]});
      drawShell();
      spawnChips(20);

      // สลับจากชมพู → ฟ้า
      cPink.style.transition='opacity 0.5s';
      cPink.style.opacity='0';
      cReveal.style.opacity='1';

      btn.style.display='none';
      setTimeout(()=>{
        infoEl.innerHTML='🎉 หลอกแล้ว! เป็นลูกชายครับ! 🎉';
        infoEl.style.color='#007bff';
        infoEl.style.fontWeight='700';
        infoEl.style.fontSize='1.05rem';
        celebrate();
      },400);
    }
  });

  /* ── init ── */
  drawPink();
  drawReveal();
  drawShell();

})();
</script>
</body>
</html>
