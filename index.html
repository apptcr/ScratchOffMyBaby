<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Egg Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #fff8f0;
    background-image:
      radial-gradient(#f9c84a33 1px, transparent 1px),
      radial-gradient(#f9c84a22 1px, #fff8f0 1px);
    background-size: 38px 38px;
    background-position: 0 0, 19px 19px;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
  }
  .card {
    background: #ffffffee;
    border: 4px solid #d4af37;
    border-radius: 28px;
    padding: 32px 28px 28px;
    text-align: center;
    box-shadow: 0 16px 40px #0002;
    max-width: 380px; width: 92vw;
  }
  h1 { font-size: 1.8rem; color: #444; margin-bottom: 4px; }
  .subtitle { font-size: 1rem; color: #888; margin-bottom: 22px; }

  .egg-wrap {
    position: relative;
    width: 220px; height: 260px;
    margin: 0 auto 24px;
  }
  canvas { position: absolute; top: 0; left: 0; }

  .dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid #ccc; background: #eee;
    transition: background .3s, border-color .3s;
  }
  .dot.pink { background: #ff69b4; border-color: #c0408a; }
  .dot.blue { background: #3399ff; border-color: #0066cc; }

  .hit-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 34px;
    font-family: 'Kanit', sans-serif; font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #f9c84a, #d4af37);
    color: #5a3e1b;
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 18px #d4af3755;
    transition: transform .1s, opacity .3s;
    user-select: none;
  }
  .hit-btn:active:not(:disabled) { transform: scale(0.94); }
  .hit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .hammer { display: inline-block; font-size: 1.4rem; }

  @keyframes shake {
    0%,100%{transform:translate(0,0) rotate(0)}
    20%{transform:translate(-7px,-4px) rotate(-3deg)}
    40%{transform:translate(7px,-6px) rotate(3deg)}
    60%{transform:translate(-4px,3px) rotate(-2deg)}
    80%{transform:translate(4px,4px) rotate(2deg)}
  }
  .egg-wrap.shaking { animation: shake .45s ease; }

  .info {
    height: 30px; margin-top: 12px;
    font-size: 1rem; color: #888;
  }
  .info span { color: #d4af37; font-weight: 700; font-size: 1.1rem; }

  /* flash overlay สำหรับครั้งที่ 5 */
  #flashOverlay {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 999;
    opacity: 0;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🥚 ลุ้นเพศลูกน้อย!</h1>
  <p class="subtitle">ทุบไข่แล้วจะรู้ว่าเป็นใคร!</p>

  <div class="dots" id="dots"></div>

  <div class="egg-wrap" id="eggWrap">
    <!-- ชั้นล่าง: สีไข่ (สลับชมพู/ฟ้า) -->
    <canvas id="cColor" width="220" height="260"></canvas>
    <!-- ชั้นกลาง: เฉลยจริง (ซ่อนจนสุดท้าย) -->
    <canvas id="cReveal" width="220" height="260" style="opacity:0;transition:opacity 0.5s"></canvas>
    <!-- ชั้นบน: เปลือกไข่ -->
    <canvas id="cShell" width="220" height="260"></canvas>
  </div>

  <button class="hit-btn" id="hitBtn">
    <span class="hammer">🔨</span><span id="btnLabel"> ทุบไข่!</span>
  </button>
  <div class="info" id="info"></div>
</div>

<div id="flashOverlay"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
(function(){
  const TOTAL = 5;
  const WAIT  = 5;

  const wrap     = document.getElementById('eggWrap');
  const cColor   = document.getElementById('cColor');
  const cReveal  = document.getElementById('cReveal');
  const cShell   = document.getElementById('cShell');
  const colCtx   = cColor.getContext('2d');
  const revCtx   = cReveal.getContext('2d');
  const sCtx     = cShell.getContext('2d');
  const btn      = document.getElementById('hitBtn');
  const label    = document.getElementById('btnLabel');
  const infoEl   = document.getElementById('info');
  const dotsEl   = document.getElementById('dots');
  const flash    = document.getElementById('flashOverlay');

  const W=220, H=260, CX=110, CY=135, RX=85, RY=108;

  let hits   = 0;
  let waiting= false;
  let peeled = [];

  // สีตาม hit: 1=ชมพู, 2=ฟ้า, 3=ชมพู, 4=ฟ้า
  const HIT_COLORS = [null, 'pink', 'blue', 'pink', 'blue'];

  // dots
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'; d.id='d'+i;
    dotsEl.appendChild(d);
  }

  function eggClip(ctx){
    ctx.beginPath();
    ctx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    ctx.clip();
  }

  /* ── วาดสีพื้นไข่ (ชมพูหรือฟ้า) ── */
  function drawColor(color){
    colCtx.clearRect(0,0,W,H);
    colCtx.save();
    eggClip(colCtx);

    let g;
    if(color === 'pink'){
      g = colCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
      g.addColorStop(0,'#ffb3d9');
      g.addColorStop(1,'#ff69b4');
      colCtx.fillStyle = g;
      colCtx.fill();
      colCtx.font='22px serif';
      colCtx.textAlign='center'; colCtx.textBaseline='middle';
      ['💕','🎀','💗','💖','✨'].forEach((e,i)=>{
        const pos=[[CX,CY],[CX-28,CY-35],[CX+30,CY-20],[CX-22,CY+38],[CX+25,CY+42]];
        colCtx.fillText(e,pos[i][0],pos[i][1]);
      });
    } else if(color === 'blue'){
      g = colCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
      g.addColorStop(0,'#80d0ff');
      g.addColorStop(1,'#1a8cff');
      colCtx.fillStyle = g;
      colCtx.fill();
      colCtx.font='22px serif';
      colCtx.textAlign='center'; colCtx.textBaseline='middle';
      ['⭐','🌟','💙','🔵','✨'].forEach((e,i)=>{
        const pos=[[CX,CY],[CX-28,CY-35],[CX+30,CY-20],[CX-22,CY+38],[CX+25,CY+42]];
        colCtx.fillText(e,pos[i][0],pos[i][1]);
      });
    }
    colCtx.restore();

    // ขอบ
    colCtx.beginPath();
    colCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    colCtx.strokeStyle = color==='pink' ? '#c06090' : '#0055cc';
    colCtx.lineWidth=3;
    colCtx.stroke();
  }

  /* ── เฉลยจริง (ฟ้าเข้ม ลูกชาย) ── */
  function drawReveal(){
    revCtx.clearRect(0,0,W,H);
    revCtx.save();
    eggClip(revCtx);
    const g=revCtx.createRadialGradient(CX-20,CY-30,10,CX,CY,RX);
    g.addColorStop(0,'#6ec6ff'); g.addColorStop(1,'#007bff');
    revCtx.fillStyle=g; revCtx.fill();
    revCtx.fillStyle='white';
    revCtx.textAlign='center'; revCtx.textBaseline='middle';
    revCtx.font='52px serif'; revCtx.fillText('👶🏻⚽',CX,CY-26);
    revCtx.font='bold 28px Kanit,sans-serif'; revCtx.fillText('ลูกชาย!',CX,CY+26);
    revCtx.font='15px Kanit,sans-serif'; revCtx.fillStyle='#cce8ff';
    revCtx.fillText('คุณปู่คุณย่าเตรียมรับขวัญ',CX,CY+58);
    revCtx.restore();
    revCtx.beginPath();
    revCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    revCtx.strokeStyle='#0050aa'; revCtx.lineWidth=3; revCtx.stroke();
  }

  /* ── เปลือกไข่ (มีรูที่กะเทาะ) ── */
  function drawShell(){
    sCtx.clearRect(0,0,W,H);
    sCtx.save();
    eggClip(sCtx);
    const sg=sCtx.createRadialGradient(CX-25,CY-40,8,CX,CY,RX*1.1);
    sg.addColorStop(0,'#fff9ef'); sg.addColorStop(0.55,'#f5e6c8'); sg.addColorStop(1,'#d4a84b');
    sCtx.fillStyle=sg; sCtx.fill();
    sCtx.fillStyle='rgba(255,255,255,0.3)';
    for(let i=0;i<120;i++){
      sCtx.beginPath();
      sCtx.arc(CX-RX+Math.random()*RX*2,CY-RY+Math.random()*RY*2,Math.random()*1.8,0,Math.PI*2);
      sCtx.fill();
    }
    sCtx.restore();

    sCtx.globalCompositeOperation='destination-out';
    peeled.forEach(p=>{
      sCtx.beginPath();
      sCtx.ellipse(p.x,p.y,p.rx,p.ry,p.angle,0,Math.PI*2);
      sCtx.fill();
    });
    sCtx.globalCompositeOperation='source-over';

    peeled.forEach(p=>{
      (p.cracks||[]).forEach(c=>{
        sCtx.beginPath(); sCtx.moveTo(c.x1,c.y1); sCtx.lineTo(c.x2,c.y2);
        sCtx.strokeStyle='#8b5e1a'; sCtx.lineWidth=1.5; sCtx.stroke();
      });
    });

    sCtx.beginPath();
    sCtx.ellipse(CX,CY,RX,RY,0,0,Math.PI*2);
    sCtx.strokeStyle='#a07840'; sCtx.lineWidth=3; sCtx.stroke();
  }

  const ZONES=[
    {ax:CX,    ay:CY-55},
    {ax:CX+52, ay:CY-15},
    {ax:CX-52, ay:CY-15},
    {ax:CX+44, ay:CY+50},
    {ax:CX-44, ay:CY+50},
  ];

  function makePatch(idx){
    const z=ZONES[idx];
    const rx=30+Math.random()*16, ry=22+Math.random()*14;
    const angle=Math.random()*Math.PI;
    const cracks=[];
    for(let i=0;i<4+Math.floor(Math.random()*3);i++){
      const a=Math.random()*Math.PI*2;
      cracks.push({
        x1:z.ax+Math.cos(a)*rx*.85, y1:z.ay+Math.sin(a)*rx*.85,
        x2:z.ax+Math.cos(a)*(rx*1.5+Math.random()*18),
        y2:z.ay+Math.sin(a)*(rx*1.5+Math.random()*18),
      });
    }
    return {x:z.ax,y:z.ay,rx,ry,angle,cracks};
  }

  function spawnChips(count){
    const rect=cShell.getBoundingClientRect();
    const ex=rect.left+W/2, ey=rect.top+H/2;
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const chip=document.createElement('div');
        chip.style.cssText=`position:fixed;width:${12+Math.random()*18}px;height:${9+Math.random()*12}px;
          background:linear-gradient(135deg,#fff9ef,#e8c88a);border:1px solid #c9a96e;
          border-radius:${2+Math.random()*5}px;pointer-events:none;z-index:9999;
          left:${ex+(Math.random()-.5)*100}px;top:${ey+(Math.random()-.5)*70}px;`;
        document.body.appendChild(chip);
        const vx=(Math.random()-.5)*14, vy=-(5+Math.random()*9), rot=(Math.random()-.5)*400;
        let cy2=parseFloat(chip.style.top),cx2=parseFloat(chip.style.left),gy=0,t=0;
        (function fall(){
          t++; gy+=.65; cy2+=vy+gy; cx2+=vx;
          chip.style.top=cy2+'px'; chip.style.left=cx2+'px';
          chip.style.transform=`rotate(${rot*t*.05}deg)`;
          chip.style.opacity=t>28?Math.max(0,1-(t-28)/18):'1';
          if(t<55) requestAnimationFrame(fall); else chip.remove();
        })();
      },i*55);
    }
  }

  /* ── ไฟกะพริบสลับสีครั้งที่ 5 ── */
  function flashColors(cb){
    const colors=['#ff69b4','#1a8cff','#ff69b4','#1a8cff','#ff69b4','#1a8cff','#ff69b4','#1a8cff'];
    let i=0;
    function next(){
      if(i>=colors.length){ flash.style.opacity='0'; cb(); return; }
      flash.style.background=colors[i];
      flash.style.opacity='0.45';
      i++;
      setTimeout(()=>{ flash.style.opacity='0'; setTimeout(next,120); },220);
    }
    next();
  }

  function startWait(){
    waiting=true; btn.disabled=true;
    let s=WAIT;
    infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
    const t=setInterval(()=>{
      s--;
      if(s<=0){ clearInterval(t); waiting=false; btn.disabled=false; infoEl.innerHTML=''; }
      else infoEl.innerHTML=`รออีก <span>${s}</span> วิ...`;
    },1000);
  }

  function celebrate(){
    const end=Date.now()+4500;
    (function f(){
      if(Date.now()>end)return;
      const tt=(end-Date.now())/4500;
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.2,y:.65},colors:['#007bff','#87ceeb','#fff','#d4af37']});
      confetti({particleCount:Math.round(40*tt),spread:75,startVelocity:30,origin:{x:.8,y:.65},colors:['#007bff','#e0f7fa','#fff','#ffe97d']});
      requestAnimationFrame(f);
    })();
  }

  btn.addEventListener('click',()=>{
    if(waiting||hits>=TOTAL) return;

    wrap.classList.remove('shaking');
    void wrap.offsetWidth;
    wrap.classList.add('shaking');
    wrap.addEventListener('animationend',()=>wrap.classList.remove('shaking'),{once:true});

    const hitIdx = hits; // 0-based
    hits++;

    // dot
    const dot = document.getElementById('d'+hitIdx);
    if(hits < TOTAL){
      dot.classList.add(HIT_COLORS[hits]); // สีของรอบนี้
    } else {
      dot.classList.add('blue');
    }

    if(hits < TOTAL){
      // กะเทาะเปลือก + สลับสี
      peeled.push(makePatch(hitIdx));
      drawColor(HIT_COLORS[hits]); // สีใหม่หลังทุบ
      drawShell();
      spawnChips(5+Math.floor(Math.random()*5));
      label.textContent=` ทุบอีก ${TOTAL-hits} ครั้ง!`;
      startWait();

    } else {
      // ครั้งสุดท้าย!
      peeled.push({x:CX,y:CY,rx:RX+10,ry:RY+10,angle:0,cracks:[]});
      drawShell();
      spawnChips(20);
      btn.disabled=true;
      label.textContent=' กำลังเฉลย...';

      // ไฟกะพริบก่อน แล้วเผย
      flashColors(()=>{
        cColor.style.transition='opacity 0.4s';
        cColor.style.opacity='0';
        cReveal.style.opacity='1';
        btn.style.display='none';
        setTimeout(()=>{
          infoEl.innerHTML='🎉 เฉลยแล้ว! เป็นลูกชายครับ! 🎉';
          infoEl.style.color='#007bff';
          infoEl.style.fontWeight='700';
          celebrate();
        },400);
      });
    }
  });

  /* ── init ── */
  drawColor('pink'); // เริ่มด้วยชมพู (ก่อนทุบ)
  drawReveal();
  drawShell();

})();
</script>
</body>
</html>
