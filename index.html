<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Reveal Sparkle</title>
    <meta property="og:title" content="มีของขวัญมาให้ขูดลุ้นกันครับ!" />
    <meta property="og:description" content="ลองขูดดูซิว่า... จะได้อะไร?" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f0f8ff;
            --boy-blue: #007bff;
            --gold: #d4af37;
            --main-font: 'Kanit', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--gold) 1px, transparent 1px),
                radial-gradient(var(--gold) 1px, var(--bg-color) 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: var(--main-font);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.97);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 4px solid var(--gold);
            max-width: 420px;
            width: 100%;
        }

        h1 {
            color: #444;
            margin: 0 0 28px;
            font-size: 2.2rem;
        }

        /* Wrapper กำหนดขนาดจริงด้วย CSS */
        .scratch-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 6px solid var(--gold);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            /* ป้องกัน select/highlight บน mobile */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* ชั้นเฉลยด้านล่าง */
        .scratch-result {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0062cc 0%, #007bff 50%, #4da3ff 100%);
            color: white;
            gap: 6px;
        }

        .result-icon { font-size: 72px; line-height: 1; }
        .result-text-big {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .result-text-small { font-size: 1rem; opacity: 0.9; }

        /* Canvas ขูด — อยู่บนสุด */
        #scratch-canvas {
            position: absolute;
            inset: 0;
            /* ขนาด CSS ตรงกับ wrapper เสมอ */
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 2;
            /* transition สำหรับ fade-out เมื่อเผยเฉลย */
            transition: opacity 0.8s ease;
        }

        .instruction {
            color: #666;
            margin-top: 20px;
            font-size: 1.05rem;
            min-height: 1.6em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 380px) {
            .scratch-wrapper { width: 260px; height: 260px; }
            h1 { font-size: 1.8rem; }
            .result-text-big { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ขูดลุ้นของขวัญกัน!</h1>

    <div class="scratch-wrapper" id="js-wrapper">
        <!-- ชั้นเฉลย (ล่าง) -->
        <div class="scratch-result">
            <div class="result-icon">👶🏻⚽</div>
            <div class="result-text-big">ได้ลูกชาย</div>
            <div class="result-text-small">คุณปู่คุณย่าเตรียมรับขวัญนะครับ</div>
        </div>

        <!-- ชั้นทองด้านบน -->
        <canvas id="scratch-canvas"></canvas>
    </div>

    <p class="instruction" id="js-instruction">ใช้นิ้วหรือเมาส์ขูดที่ช่องด้านบนได้เลย 🎁</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
(function () {
    const wrapper     = document.getElementById('js-wrapper');
    const canvas      = document.getElementById('scratch-canvas');
    const ctx         = canvas.getContext('2d');
    const instruction = document.getElementById('js-instruction');

    let isDrawing = false;
    let revealed  = false;

    /* ─── 1. ตั้งค่า canvas ให้ตรงกับขนาด wrapper จริงๆ ─── */
    function resizeCanvas() {
        const W = wrapper.offsetWidth;
        const H = wrapper.offsetHeight;
        canvas.width  = W;
        canvas.height = H;
        if (!revealed) drawGoldLayer(W, H);
    }

    /* ─── 2. วาดชั้นสีทอง ─── */
    function drawGoldLayer(W, H) {
        const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.85);
        grad.addColorStop(0,   '#ffe97d');
        grad.addColorStop(0.5, '#d4af37');
        grad.addColorStop(1,   '#a67c00');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // จุดประกาย
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        for (let i = 0; i < 300; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*W, Math.random()*H, Math.random()*2.2, 0, Math.PI*2);
            ctx.fill();
        }

        // ข้อความ
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.font = `700 ${Math.round(W * 0.08)}px Kanit, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('ขูดตรงนี้ 🎁', W/2, H/2);
    }

    /* ─── 3. หาพิกัดบน canvas จาก event ─── */
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        // scaleX/Y แก้กรณี CSS size ≠ canvas pixel size (ไม่ควรเกิดแต่ safety)
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        const src = e.touches ? e.touches[0] : e;
        return {
            x: (src.clientX - rect.left) * scaleX,
            y: (src.clientY - rect.top)  * scaleY
        };
    }

    /* ─── 4. ขูด ─── */
    function doScratch(e) {
        if (!isDrawing || revealed) return;
        e.preventDefault();

        const { x, y } = getPos(e);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        checkReveal();
    }

    /* ─── 5. เช็คว่าขูดพอหรือยัง ─── */
    function checkReveal() {
        if (revealed) return;

        const data    = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const total   = data.length / 4;          // จำนวน pixel ทั้งหมด
        let   cleared = 0;

        // สุ่มตรวจทุก 4 pixel เพื่อ performance
        for (let i = 3; i < data.length; i += 4 * 4) {
            if (data[i] < 10) cleared++;           // alpha ≈ 0 = ถูกขูดไปแล้ว
        }

        // ถ้าขูดไป 40% ขึ้นไป → เผย
        if (cleared / (total / 4) >= 0.40) {
            revealAnswer();
        }
    }

    /* ─── 6. เผยคำตอบ ─── */
    function revealAnswer() {
        if (revealed) return;
        revealed = true;

        // Fade canvas ออก
        canvas.style.opacity = '0';
        canvas.style.pointerEvents = 'none';

        instruction.innerHTML = '✨ สมาชิกใหม่เป็นลูกชายครับ! ✨';
        instruction.style.animation = 'none';
        instruction.style.color = '#007bff';
        instruction.style.fontWeight = '700';

        // Confetti 🎉
        const end  = Date.now() + 4500;
        const tick = setInterval(() => {
            if (Date.now() > end) return clearInterval(tick);
            const t = (end - Date.now()) / 4500;
            confetti({ particleCount: Math.round(40 * t), spread: 80, startVelocity: 35,
                origin: { x: 0.2, y: 0.6 }, colors: ['#007bff','#87ceeb','#ffffff','#d4af37'] });
            confetti({ particleCount: Math.round(40 * t), spread: 80, startVelocity: 35,
                origin: { x: 0.8, y: 0.6 }, colors: ['#007bff','#e0f7fa','#ffffff','#ffe97d'] });
        }, 300);
    }

    /* ─── 7. Event Listeners ─── */
    // Mouse
    canvas.addEventListener('mousedown',  (e) => { isDrawing = true;  doScratch(e); });
    window.addEventListener('mousemove',  doScratch);
    window.addEventListener('mouseup',    () => { isDrawing = false; });

    // Touch
    canvas.addEventListener('touchstart', (e) => { isDrawing = true;  doScratch(e); }, { passive: false });
    canvas.addEventListener('touchmove',  doScratch,                                   { passive: false });
    canvas.addEventListener('touchend',   () => { isDrawing = false; });

    /* ─── 8. Init ─── */
    resizeCanvas();
    // ถ้า window resize ให้วาดใหม่ (rare บน mobile)
    window.addEventListener('resize', resizeCanvas);
})();
</script>

</body>
</html>
